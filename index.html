<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEXTER · Short Dracin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-image: radial-gradient(ellipse at 30% 20%, #1a1f3a 0%, #0a0e1a 70%);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 38, 63, 0.95);
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 14px 28px;
            border-radius: 16px;
            border: 1px solid rgba(245, 215, 66, 0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            font-weight: 500;
            z-index: 9999;
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 90%;
        }
        .toast.show { display: flex; animation: slideUp 0.4s ease; }
        .toast i { color: #f5d742; font-size: 1.2rem; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ===== LANDING ===== */
        #landingPage {
            max-width: 900px;
            width: 100%;
            background: rgba(20, 26, 43, 0.8);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 50px 40px;
            border: 1px solid rgba(245, 215, 66, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }
        #landingPage .logo { text-align: center; margin-bottom: 24px; }
        #landingPage .logo h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f5d742, #f0b400, #f5d742);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        #landingPage .logo p { color: #8892b0; font-size: 1rem; letter-spacing: 3px; font-weight: 300; }
        #landingPage .hero { text-align: center; padding: 30px 0 20px; }
        #landingPage .hero h2 { font-size: 2rem; color: #fff; font-weight: 700; margin-bottom: 12px; }
        #landingPage .hero h2 span {
            background: linear-gradient(135deg, #f5d742, #f0b400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #landingPage .hero p { color: #8892b0; font-size: 1.1rem; max-width: 500px; margin: 0 auto; }
        .landing-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 28px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f5d742, #e6a800);
            color: #0a0e1a;
            padding: 14px 44px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 24px rgba(245, 215, 66, 0.25);
        }
        .btn-primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 40px rgba(245, 215, 66, 0.35); }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #f5d742;
            padding: 14px 44px;
            border: 1px solid rgba(245, 215, 66, 0.3);
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover { background: rgba(245, 215, 66, 0.1); border-color: #f5d742; transform: translateY(-2px); }
        .btn-danger {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            padding: 10px 22px;
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-danger:hover { background: rgba(255, 107, 107, 0.2); border-color: #ff6b6b; }
        .btn-success {
            background: linear-gradient(135deg, #4ecdc4, #2ea89e);
            color: #0a0e1a;
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(78, 205, 196, 0.3); }
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-warning:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3); }
        .btn-ghost {
            background: rgba(255,255,255,0.05);
            color: #b9c4e0;
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
            border-radius: 8px;
        }

        /* ===== AUTH ===== */
        .auth-container {
            display: none;
            max-width: 400px;
            width: 100%;
            background: rgba(20, 26, 43, 0.9);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 40px 32px;
            border: 1px solid rgba(245, 215, 66, 0.12);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }
        .auth-container.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .auth-container .logo h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f5d742, #f0b400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .auth-container .logo p { text-align: center; color: #8892b0; font-size: 0.85rem; margin-bottom: 28px; }
        .auth-container label { color: #b9c4e0; font-size: 0.8rem; font-weight: 500; display: block; margin-bottom: 6px; }
        .auth-container input {
            width: 100%;
            padding: 13px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
            transition: 0.3s;
        }
        .auth-container input:focus { border-color: #f5d742; box-shadow: 0 0 0 3px rgba(245, 215, 66, 0.1); background: rgba(255,255,255,0.06); }
        .auth-container input::placeholder { color: #475074; }
        .auth-container .btn-auth {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #f5d742, #e6a800);
            color: #0a0e1a;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .auth-container .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245, 215, 66, 0.25); }
        .auth-switch { text-align: center; margin-top: 16px; color: #7a87b0; font-size: 0.9rem; }
        .auth-switch a { color: #f5d742; cursor: pointer; font-weight: 600; }
        .auth-switch a:hover { text-decoration: underline; }
        .auth-error { color: #ff6b6b; font-size: 0.85rem; text-align: center; margin-top: 10px; display: none; }

        /* ===== DASHBOARD ===== */
        #dashboard {
            display: none;
            max-width: 1100px;
            width: 100%;
        }
        #dashboard.active { display: block; animation: fadeIn 0.4s ease; }

        .dash-nav {
            background: rgba(20, 26, 43, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 14px 24px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .dash-nav .brand { font-size: 1.6rem; font-weight: 900; color: #f5d742; display: flex; align-items: center; gap: 8px; }
        .dash-nav .brand span { color: #8892b0; font-weight: 400; font-size: 0.8rem; }
        .dash-nav .user-info { display: flex; align-items: center; gap: 16px; }
        .dash-nav .user-info .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5d74220, #f0b40020);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f5d742;
            border: 2px solid rgba(245, 215, 66, 0.2);
        }
        .dash-nav .user-info .name { color: #fff; font-weight: 600; }
        .dash-nav .user-info .role { color: #8892b0; font-size: 0.75rem; }

        .tab-nav {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            background: rgba(20, 26, 43, 0.6);
            backdrop-filter: blur(20px);
            padding: 6px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .tab-nav .tab-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: #8892b0;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .tab-nav .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.04); }
        .tab-nav .tab-btn.active {
            background: linear-gradient(135deg, #f5d742, #e6a800);
            color: #0a0e1a;
            box-shadow: 0 4px 20px rgba(245, 215, 66, 0.2);
        }
        .tab-content {
            display: none;
            background: rgba(20, 26, 43, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 16px 18px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: 0.3s;
        }
        .stat-card:hover { background: rgba(255,255,255,0.05); border-color: rgba(245, 215, 66, 0.1); }
        .stat-card .label { color: #8892b0; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .stat-card .value { font-size: 1.4rem; font-weight: 800; color: #fff; margin-top: 4px; }
        .stat-card .value.highlight { color: #f5d742; }
        .stat-card .value.green { color: #4ecdc4; }
        .stat-card .value.purple { color: #a78bfa; }

        /* ===== VIDEO GRID ===== */
        .video-section {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 24px;
        }
        .video-section .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .video-section .header h4 {
            color: #f5d742;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .video-section .header .badge-count {
            background: rgba(245, 215, 66, 0.12);
            color: #f5d742;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
        }
        .video-card {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .video-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-3px);
            border-color: rgba(245, 215, 66, 0.25);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .video-card .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #1a1f3a, #2d3655);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #f5d742;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        .video-card .thumbnail .play-overlay {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(245, 215, 66, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0e1a;
            font-size: 1.3rem;
            transition: 0.3s;
        }
        .video-card:hover .thumbnail .play-overlay {
            transform: scale(1.1);
            background: #f5d742;
        }
        .video-card .video-title {
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 40px;
        }
        .video-card .video-meta {
            color: #8892b0;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .video-card .video-meta .reward {
            color: #f5d742;
            font-weight: 600;
        }
        .video-card .status-watched {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
        }
        .video-card .status-watched i { margin-right: 4px; }
        .video-card .video-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: #8892b0;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
        }

        /* ===== VIDEO MODAL ===== */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .video-modal.active { display: flex; animation: fadeIn 0.3s ease; }
        .video-modal .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10001;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .video-modal .close-btn:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }
        .video-modal .video-wrapper {
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 800px;
            position: relative;
        }
        .video-modal iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
        .video-modal .video-overlay {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #8892b0;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }
        .video-modal .timer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
        }
        .video-modal .timer-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #f5d742, #ff6b6b);
            width: 0%;
            transition: width 0.5s;
        }
        .video-modal .skip-block {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 1.2rem;
            font-weight: 700;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 16px;
            border: 2px solid #ff6b6b;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
        }
        .video-modal .skip-block.show { opacity: 1; }

        /* Tables */
        .table-wrap { overflow-x: auto; margin-top: 12px; }
        .table-wrap table { width: 100%; border-collapse: collapse; min-width: 350px; }
        .table-wrap th {
            text-align: left;
            padding: 10px 10px 10px 0;
            color: #f5d742;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .table-wrap td { padding: 10px 10px 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); color: #d6e0ff; font-size: 0.85rem; }
        .badge-level {
            background: rgba(245, 215, 66, 0.12);
            padding: 2px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.7rem;
            color: #f5d742;
        }

        .form-inline { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 12px 0; }
        .form-inline input, .form-inline textarea {
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: #fff;
            outline: none;
            flex: 1;
            min-width: 140px;
        }
        .form-inline input:focus, .form-inline textarea:focus { border-color: #f5d742; box-shadow: 0 0 0 3px rgba(245, 215, 66, 0.08); }
        .form-inline textarea { min-height: 60px; resize: vertical; }

        .admin-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .admin-settings .setting-group {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .admin-settings .setting-group h4 {
            color: #f5d742;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .admin-settings .setting-group .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            color: #d6e0ff;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
            align-items: center;
        }
        .admin-settings .setting-group .row input { width: 80px; padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.3); color: #fff; text-align: center; }
        .admin-settings .setting-group .row input[type="text"] { width: 100%; text-align: left; }

        .video-list-admin .video-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .video-list-admin .video-item .info { color: #d6e0ff; font-size: 0.85rem; flex: 1; }
        .video-list-admin .video-item .info .title { color: #fff; font-weight: 500; }
        .video-list-admin .video-item .info .link { color: #8892b0; font-size: 0.7rem; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }

        /* ===== RABAT SECTION ===== */
        .rabat-section {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-top: 16px;
        }
        .rabat-section h4 {
            color: #f5d742;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .rabat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }
